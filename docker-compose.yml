services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: permitai-postgres
    environment:
      POSTGRES_USER: permitai
      POSTGRES_PASSWORD: permitai
      POSTGRES_DB: permitai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U permitai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: permitai-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.8.1-python3.12
    container_name: permitai-airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://permitai:permitai@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@permitai.la
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    image: apache/airflow:2.8.1-python3.12
    container_name: permitai-airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://permitai:permitai@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./backend/airflow/dags:/opt/airflow/dags
    command: airflow webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    profiles:
      - airflow

  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.12
    container_name: permitai-airflow-scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://permitai:permitai@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./backend/airflow/dags:/opt/airflow/dags
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    profiles:
      - airflow

  mailhog:
    image: mailhog/mailhog:latest
    container_name: permitai-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    profiles:
      - mail

volumes:
  pgdata:
  redisdata:
