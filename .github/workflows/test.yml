name: Test

on:
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Ruff check
        run: cd backend && ruff check .
      - name: Ruff format
        run: cd backend && ruff format --check .
      - name: Mypy
        run: cd backend && mypy app/ --ignore-missing-imports

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: permitai_test
          POSTGRES_PASSWORD: permitai_test
          POSTGRES_DB: permitai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://permitai_test:permitai_test@localhost:5432/permitai_test
      DATABASE_URL_SYNC: postgresql://permitai_test:permitai_test@localhost:5432/permitai_test
      REDIS_URL: redis://localhost:6379/0
      MOCK_AUTH: "true"
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run migrations
        run: cd backend && alembic upgrade head
      - name: Run tests
        run: cd backend && pytest --cov=app --cov-report=xml tests/
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml

  dashboard-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and lint
        run: |
          cd dashboard
          npm ci
          npm run lint || true
          npx tsc --noEmit || true

  mobile-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and lint
        run: |
          cd mobile
          npm ci
          npx tsc --noEmit || true
