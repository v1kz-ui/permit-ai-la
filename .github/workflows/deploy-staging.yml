name: Deploy to Staging

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: permitai-api

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          docker build -f infrastructure/docker/api.Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Run migrations
        env:
          DATABASE_URL_SYNC: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          cd backend
          pip install -e .
          alembic upgrade head

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster permitai-staging \
            --service permitai-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster permitai-staging \
            --services permitai-api \
            --region ${{ env.AWS_REGION }}

      - name: Smoke test
        run: |
          curl -f ${{ secrets.STAGING_API_URL }}/api/v1/health || exit 1
