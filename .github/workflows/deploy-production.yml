name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: permitai-api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_TAG="sha-${{ github.sha }}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker build \
            -f infrastructure/docker/api.Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:production-latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:production-latest

  migrate:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database migrations
        env:
          DATABASE_URL_SYNC: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          cd backend
          pip install -e .
          alembic upgrade head

  deploy:
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: production
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to ECS (blue/green)
        id: deploy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          # Update task definition with new image
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition permitai-api-production \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          REGISTERED=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Registered new task definition: $REGISTERED"

          # Update service with new task definition
          aws ecs update-service \
            --cluster permitai-production \
            --service permitai-api \
            --task-definition "$REGISTERED" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster permitai-production \
            --services permitai-api \
            --region ${{ env.AWS_REGION }}

      - name: Run smoke tests
        id: smoke-tests
        run: |
          API_URL="${{ secrets.PRODUCTION_API_URL }}"

          echo "Testing health endpoint..."
          curl -f "$API_URL/api/v1/health" || exit 1

          echo "Testing readiness probe..."
          curl -f "$API_URL/api/v1/monitoring/health/ready" || exit 1

          echo "Testing liveness probe..."
          curl -f "$API_URL/api/v1/monitoring/health/live" || exit 1

          echo "All smoke tests passed."

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'success'
        run: |
          echo "Deployment failed. Rolling back to previous task definition..."
          aws ecs update-service \
            --cluster permitai-production \
            --service permitai-api \
            --task-definition permitai-api-production \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

          aws ecs wait services-stable \
            --cluster permitai-production \
            --services permitai-api \
            --region ${{ env.AWS_REGION }}

          echo "Rollback complete."

      - name: Tag release
        if: success()
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          RELEASE_TAG="release-$(date +%Y%m%d-%H%M%S)"
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"
          echo "Tagged release: $RELEASE_TAG"

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Production Deploy: ${{ job.status }}\nCommit: ${{ github.sha }}\nActor: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
